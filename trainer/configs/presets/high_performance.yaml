# Configuration preset for high-performance training
# For systems with powerful GPUs (A100, H100, etc.)

defaults:
  - /base/base

# Maximum model capacity
model:
  max_seq_length: 4096  # Longer sequences
  load_in_4bit: false  # Full precision if memory allows
  dtype: "bfloat16"

# Larger LoRA configuration
lora:
  rank: 128  # Higher rank
  lora_alpha: 64
  use_dora: true  # Enable DoRA if supported

# Optimized training settings
training:
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 2  # Effective batch size of 32
  learning_rate: 3e-4
  warmup_steps: 100
  fp16: false
  bf16: true  # Use bfloat16 for better stability
  tf32: true  # Enable TF32 on Ampere GPUs
  optim: "adamw_torch_fused"  # Fused optimizer
  gradient_checkpointing: false  # Disable for speed
  dataloader_num_workers: 4
  
# Maximum GPU utilization
gpu:
  memory_utilization: 0.9
  device_map: "auto"

# Parallel data processing
dataset:
  num_proc: 8  # Parallel processing
  
# Comprehensive evaluation
evaluation:
  num_test_cases: 50  # Many test cases
  visualize: true
  save_plots: true
  
# Enhanced GRPO settings
grpo:
  num_generations: 16  # Many generations
  max_new_tokens: 1024
  temperature: 0.7
  
# Advanced features
advanced:
  compile_model: true  # Torch compile for speed
  use_flash_attention: true  # Flash Attention 2
  use_liger_kernel: true  # Optimized kernels