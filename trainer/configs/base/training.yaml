# Training strategy configurations

# SFT (Supervised Fine-Tuning) configuration
sft:
  strategy: "sft"
  num_train_epochs: 2
  learning_rate: 2e-4
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  warmup_steps: 5
  max_steps: -1
  logging_steps: 1
  save_steps: 100
  
# GRPO (Group Relative Policy Optimization) configuration  
grpo:
  strategy: "grpo"
  num_train_epochs: 1
  learning_rate: 5e-6
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  warmup_steps: 0
  max_steps: 50
  logging_steps: 1
  save_steps: 10
  # GRPO specific
  num_generations: 4
  temperature: 1.0
  do_sample: true
  top_p: 0.9
  top_k: 50
  max_new_tokens: 512
  pad_token_id: 0
  
# DPO (Direct Preference Optimization) configuration
dpo:
  strategy: "dpo"
  num_train_epochs: 1
  learning_rate: 5e-7
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  warmup_steps: 10
  max_steps: -1
  logging_steps: 1
  save_steps: 50
  # DPO specific
  beta: 0.1
  label_smoothing: 0.0
  loss_type: "sigmoid"
  
# Quick test configuration
quick_test:
  num_train_epochs: 1
  max_steps: 10
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1
  logging_steps: 1
  save_steps: 10
  evaluation_strategy: "steps"
  eval_steps: 5